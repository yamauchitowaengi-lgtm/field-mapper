<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>現場マッパー Pro v1.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 50vh; width: 100%; z-index: 1; }
        /* 印刷用スタイル */
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            #map { 
                height: 500px !important; 
                width: 100% !important; 
                border: 1px solid #000;
                overflow: visible !important;
            }
            .card { break-inside: avoid; border: 1px solid #ccc; margin-bottom: 10px; }
            /* 地図のタイルを強制表示させるおまじない */
            .leaflet-tile { opacity: 1 !important; }
        }
        .number-icon {
            background-color: #2563eb;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
        }
    </style>
</head>
<body class="bg-slate-100 pb-10">

    <header class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-lg font-bold">📍 現場マッパー Pro</h1>
        <button onclick="window.print()" class="no-print bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-sm font-bold shadow">
            PDF帳票を出力
        </button>
    </header>

    <main class="p-4 space-y-4">
        <div id="map" class="rounded-xl shadow-md border-2 border-white"></div>

        <div class="no-print bg-white p-4 rounded-xl shadow">
            <label class="block mb-2 text-sm font-bold text-gray-700">【1】写真を追加（複数選択可）</label>
            <input type="file" id="photoInput" accept="image/*" multiple class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700">
        </div>

        <div id="photoList" class="space-y-2">
            <h2 class="font-bold text-gray-700 border-b pb-1">【2】写真・メモ一覧</h2>
        </div>
    </main>

    <script>
        const map = L.map('map').setView([35.6812, 139.7671], 5);
        // 印刷時にも背景が出るように設定
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let photoCount = 0;

        document.getElementById('photoInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                EXIF.getData(file, function() {
                    const lat = EXIF.getTag(this, "GPSLatitude");
                    const lon = EXIF.getTag(this, "GPSLongitude");
                    const latRef = EXIF.getTag(this, "GPSLatitudeRef") || "N";
                    const lonRef = EXIF.getTag(this, "GPSLongitudeRef") || "E";

                    if (lat && lon) {
                        const dLat = (lat[0] + lat[1]/60 + lat[2]/3600) * (latRef === "N" ? 1 : -1);
                        const dLon = (lon[0] + lon[1]/60 + lon[2]/3600) * (lonRef === "E" ? 1 : -1);
                        photoCount++;
                        addRecord(dLat, dLon, photoCount, file);
                    } else {
                        alert(file.name + " に位置情報がありません");
                    }
                });
            });
        });

        function addRecord(lat, lon, num, file) {
            // 地図に番号付きのカスタムアイコンを表示
            const icon = L.divIcon({
                className: 'number-icon',
                html: num,
                iconSize: [24, 24]
            });
            L.marker([lat, lon], {icon: icon}).addTo(map);
            map.setView([lat, lon], 17);

            // リスト追加
            const reader = new FileReader();
            reader.onload = function(e) {
                const list = document.getElementById('photoList');
                const div = document.createElement('div');
                div.className = "card bg-white p-3 rounded-lg shadow flex gap-3 items-start";
                div.innerHTML = `
                    <div class="bg-blue-600 text-white w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center font-bold text-xs">${num}</div>
                    <img src="${e.target.result}" class="w-24 h-24 object-cover rounded shadow flex-shrink-0">
                    <div class="flex-1">
                        <textarea placeholder="メモを入力..." class="w-full border-b focus:outline-none focus:border-blue-500 text-sm h-16 resize-none p-1" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                        <p class="text-[10px] text-gray-400 mt-1">${file.name} (Lat:${lat.toFixed(4)}, Lon:${lon.toFixed(4)})</p>
                    </div>
                `;
                list.appendChild(div);
            };
            reader.readAsDataURL(file);
        }
    </script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
